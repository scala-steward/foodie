backend:
  image:
    repository: nikitadanilenko/foodie
    tag: latest
    pullPolicy: Always
  port: 9000
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

frontend:
  image:
    repository: nikitadanilenko/foodie-frontend
    tag: latest
    pullPolicy: Always
  port: 80
  replicaCount: 1
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  database: foodie
  username: foodie
  storage:
    size: 1Gi

ingress:
  host: foodie.danilenko.io
  clusterIssuer: letsencrypt-prod

config:
  jwtDurationSeconds: "86400"
  jwtPublicKey: ""
  mailerHost: "localhost"
  mailerFrom: "foodie@localhost"
  mailerPort: "1025"

