name: Update GitOps deployment

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      component:
        type: string
        required: true
        description: "Either 'backend' or 'frontend'"

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ github.workspace }}/source

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.GITOPS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.GITOPS_BOT_PRIVATE_KEY }}
          owner: nikitaDanilenko
          repositories: git-ops

      - name: Check out GitOps repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nikitaDanilenko/git-ops
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops

      - name: Copy deployment manifests
        run: |
          # Remove existing foodie folder and copy fresh from source
          rm -rf ${{ github.workspace }}/git-ops/foodie
          cp -r ${{ github.workspace }}/source/deployment ${{ github.workspace }}/git-ops/foodie

      - name: Update image tag
        working-directory: ${{ github.workspace }}/git-ops
        run: |
          # Update the appropriate component's image tag
          if [ "${{ inputs.component }}" = "backend" ]; then
            yq -i '.backend.image.tag = "${{ inputs.version }}"' foodie/values.yaml
          elif [ "${{ inputs.component }}" = "frontend" ]; then
            yq -i '.frontend.image.tag = "${{ inputs.version }}"' foodie/values.yaml
          fi

      - name: Determine commit title
        id: commit
        run: echo "title=$(echo '${{ github.event.head_commit.message }}' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          branch: deploy/foodie-${{ inputs.component }}-${{ inputs.version }}
          delete-branch: true
          title: "Deploy `foodie-${{ inputs.component }}:${{ inputs.version }}`"
          body: |
            Automated deployment PR for foodie ${{ inputs.component }}.
            
            **Version:** `${{ inputs.version }}`
            **Triggered by:** [${{ steps.commit.outputs.title }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          commit-message: "Update foodie-${{ inputs.component }} to ${{ inputs.version }}"
          labels: |
            deployment
            automated
